<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vote - NAU Voting</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-[11px] font-bold tracking-tight flex-shrink-0">
        NAU
      </div>
      <span class="text-sm font-medium text-gray-900">NAU Voting</span>
    </div>
    <div class="flex gap-2 flex-wrap">
      <a href="voter-dashboard.html" class="h-[34px] px-4 border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors inline-flex items-center">Voter</a>
      <button onclick="logout()" class="h-[34px] px-4 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-sm font-medium text-white transition-colors inline-flex items-center">Logout</button>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 px-6 py-10 max-w-4xl mx-auto w-full">

    <!-- Page Header -->
    <div class="flex items-start justify-between gap-4 mb-8 flex-wrap">
      <div>
        <span class="inline-flex items-center gap-1.5 text-xs font-medium text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full mb-3">
          <span class="w-1.5 h-1.5 bg-indigo-600 rounded-full"></span>
          Secure Voting Booth
        </span>
        <h1 class="text-3xl font-semibold text-gray-900 leading-snug mb-1">Cast Your Vote</h1>
        <p class="text-[15px] text-gray-500 leading-relaxed">Select one approved candidate per role. Once submitted, the vote is locked permanently.</p>
      </div>
      <a href="results.html" class="h-10 px-5 border border-gray-200 hover:bg-gray-50 rounded-lg text-sm font-medium text-gray-700 transition-colors inline-flex items-center flex-shrink-0">
        View Results
      </a>
    </div>

    <!-- Alert -->
    <div id="voteMessage" class="hidden mb-6 px-4 py-3 rounded-lg border border-indigo-100 bg-indigo-50 text-sm text-indigo-700"></div>

    <!-- Election Selector Card -->
    <section class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm mb-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Select Election</label>
          <select id="voteElectionSelect" onchange="loadVotingPage()"
            class="w-full h-10 px-3 border border-gray-200 rounded-lg text-sm text-gray-900 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Voting Window</label>
          <div id="voteWindow" class="text-sm text-gray-400 mt-2.5">Select an election</div>
        </div>
      </div>

      <hr class="border-gray-100 my-5">

      <h2 id="voteTitle" class="text-base font-semibold text-gray-900">Voting Page</h2>
    </section>

    <!-- Roles / Candidate Cards — single column so each role spans full width -->
    <section id="voteRoles" class="flex flex-col gap-4"></section>

  </main>

  <script src="js/api.js"></script>
  <script src="js/vote.js"></script>
</body>
</html>
