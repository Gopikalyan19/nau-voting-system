<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voter Dashboard - NAU Voting</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-[11px] font-bold tracking-tight flex-shrink-0">
        NAU
      </div>
      <span class="text-sm font-medium text-gray-900">NAU Voting</span>
    </div>
    <div class="flex gap-2 flex-wrap">
      <a href="voter-dashboard.html" class="h-[34px] px-4 border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors inline-flex items-center">Voter</a>
      <a href="vote.html" class="h-[34px] px-4 border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors inline-flex items-center">Vote</a>
      <button onclick="logout()" class="h-[34px] px-4 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-sm font-medium text-white transition-colors inline-flex items-center">Logout</button>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 px-6 py-10 max-w-4xl mx-auto w-full">

    <!-- Page Header -->
    <div class="flex items-start justify-between gap-4 mb-8 flex-wrap">
      <div>
        <span class="inline-flex items-center gap-1.5 text-xs font-medium text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full mb-3">
          <span class="w-1.5 h-1.5 bg-indigo-600 rounded-full"></span>
          Member Dashboard
        </span>
        <h1 class="text-3xl font-semibold text-gray-900 leading-snug mb-1">Hello, <span id="voterName">Member</span></h1>
        <p class="text-[15px] text-gray-500 leading-relaxed">View elections, apply as candidate, and vote securely.</p>
      </div>
      <a href="vote.html" class="h-10 px-5 bg-indigo-600 hover:bg-indigo-700 active:scale-[0.99] rounded-lg text-sm font-medium text-white transition-all inline-flex items-center flex-shrink-0">
        Start Voting
      </a>
    </div>

    <!-- Alert -->
    <div id="voterMessage" class="hidden mb-6 px-4 py-3 rounded-lg border border-indigo-100 bg-indigo-50 text-sm text-indigo-700"></div>

    <!-- Available Elections -->
    <section class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm mb-6">
      <h3 class="text-base font-semibold text-gray-900 mb-4">Available Elections</h3>
      <div id="electionCards" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
    </section>

   

  </main>

  <script src="js/api.js"></script>
  <script src="js/voter.js"></script>
</body>
</html>
