<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Dashboard - NAU Voting</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-50 flex flex-col">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-[11px] font-bold tracking-tight">
        NAU
      </div>
      <span class="text-sm font-medium text-gray-900">NAU Voting</span>
    </div>

    <div class="flex gap-2 flex-wrap">
      <a href="candidate-dashboard.html" class="h-[34px] px-4 border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 inline-flex items-center">
        Candidate
      </a>
      <button onclick="logout()" class="h-[34px] px-4 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-sm font-medium text-white inline-flex items-center">
        Logout
      </button>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 px-6 py-10 max-w-4xl mx-auto w-full">

    <!-- Header -->
    <div class="flex items-start justify-between gap-4 mb-8 flex-wrap">
      <div>
        <span class="inline-flex items-center gap-1.5 text-xs font-medium text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full mb-3">
          <span class="w-1.5 h-1.5 bg-indigo-600 rounded-full"></span>
          Candidate Apply
        </span>

        <h1 class="text-3xl font-semibold text-gray-900 leading-snug mb-1">
          Hello, <span id="voterName">Member</span>
        </h1>

        <p class="text-[15px] text-gray-500 leading-relaxed">
          View elections, apply as candidate, and wait for admin approval.
        </p>
      </div>

      <a href="vote.html" class="h-10 px-5 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-sm font-medium text-white inline-flex items-center">
        Start Voting
      </a>
    </div>

    <!-- Message -->
    <div id="voterMessage" class="hidden mb-6 px-4 py-3 rounded-lg border text-sm"></div>

    <!-- Available Elections -->
    <section class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm mb-6">
      <h3 class="text-base font-semibold text-gray-900 mb-4">Available Elections</h3>
      <div id="electionCards" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
    </section>

    <!-- Candidate Form -->
    <section class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
      <h3 class="text-base font-semibold text-gray-900 mb-1">Candidate Application Form</h3>

      <p class="text-[13px] text-gray-500 mb-6">
        Use this form if you want to stand for a role. Admin approval is required before voters can see you.
      </p>

      <form id="candidateApplyForm" class="space-y-5">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">
              Election
            </label>
            <select id="candidateElectionSelect" name="election_id" required
              class="w-full h-10 px-3 border border-gray-200 rounded-lg text-sm text-gray-900 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </select>
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">
              Role
            </label>
            <select id="candidateRoleSelect" name="role_id" required
              class="w-full h-10 px-3 border border-gray-200 rounded-lg text-sm text-gray-900 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="">Select election first</option>
            </select>
          </div>

        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">
            Candidate Statement
          </label>
          <textarea name="statement" placeholder="Why should members vote for you?" required rows="3"
            class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 bg-gray-50 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">
            Manifesto / Plan
          </label>
          <textarea name="manifesto" placeholder="Mention your 3 to 5 main plans" rows="3"
            class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 bg-gray-50 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">
            Previous Experience
          </label>
          <textarea name="experience" placeholder="Leadership, events, volunteering, coordination experience" rows="3"
            class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 bg-gray-50 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
        </div>

        <div>
          <button type="submit" class="h-10 px-5 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-sm font-medium text-white">
            Submit Application
          </button>
        </div>

      </form>
    </section>

  </main>

  <script src="js/api.js"></script>
  <script src="js/voter.js"></script>

  <script>
    const voterName = document.getElementById("voterName");
    const voterMessage = document.getElementById("voterMessage");
    const electionCards = document.getElementById("electionCards");
    const electionSelect = document.getElementById("candidateElectionSelect");
    const roleSelect = document.getElementById("candidateRoleSelect");
    const form = document.getElementById("candidateApplyForm");

    const currentUser = JSON.parse(localStorage.getItem("currentUser")) || {
      name: "Member",
      email: "candidate@example.com"
    };

    voterName.textContent = currentUser.name || "Member";

    function showMessage(message, type = "success") {
      voterMessage.classList.remove("hidden");

      if (type === "error") {
        voterMessage.className = "mb-6 px-4 py-3 rounded-lg border border-red-100 bg-red-50 text-sm text-red-700";
      } else {
        voterMessage.className = "mb-6 px-4 py-3 rounded-lg border border-indigo-100 bg-indigo-50 text-sm text-indigo-700";
      }

      voterMessage.textContent = message;
    }

    function getElections() {
      return JSON.parse(localStorage.getItem("elections")) || [];
    }

    function getRoles() {
      return JSON.parse(localStorage.getItem("roles")) || [];
    }

    function loadElections() {
      const elections = getElections();

      electionCards.innerHTML = "";
      electionSelect.innerHTML = `<option value="">Select Election</option>`;
      roleSelect.innerHTML = `<option value="">Select election first</option>`;

      const activeElections = elections.filter(election => election.status === "active");

      if (activeElections.length === 0) {
        electionCards.innerHTML = `
          <div class="text-sm text-gray-500 bg-gray-50 border border-gray-200 rounded-lg p-4">
            No active elections available. Please ask admin to create an active election.
          </div>
        `;
        return;
      }

      activeElections.forEach(election => {
        electionCards.innerHTML += `
          <div class="border border-gray-200 rounded-lg p-4 bg-gray-50">
            <h4 class="text-sm font-semibold text-gray-900">${election.title}</h4>
            <p class="text-sm text-gray-500 mt-1">${election.description || "No description added"}</p>
          </div>
        `;

        electionSelect.innerHTML += `
          <option value="${election.id}">${election.title}</option>
        `;
      });
    }

    function loadRoles(electionId) {
      const roles = getRoles();

      roleSelect.innerHTML = `<option value="">Select Role</option>`;

      const electionRoles = roles.filter(role =>
        role.election_id === electionId || role.electionId === electionId
      );

      if (electionRoles.length === 0) {
        roleSelect.innerHTML = `<option value="">No roles found for this election</option>`;
        return;
      }

      electionRoles.forEach(role => {
        roleSelect.innerHTML += `
          <option value="${role.id}">${role.role_name || role.roleName || role.title}</option>
        `;
      });
    }

    electionSelect.addEventListener("change", function () {
      loadRoles(this.value);
    });

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const elections = getElections();
      const roles = getRoles();

      const electionId = electionSelect.value;
      const roleId = roleSelect.value;

      const statement = form.statement.value.trim();
      const manifesto = form.manifesto.value.trim();
      const experience = form.experience.value.trim();

      if (!electionId || !roleId || !statement) {
        showMessage("Please select election, role, and enter candidate statement.", "error");
        return;
      }

      const selectedElection = elections.find(election => election.id === electionId);

      const selectedRole = roles.find(role =>
        role.id === roleId
      );

      if (!selectedElection || !selectedRole) {
        showMessage("Invalid election or role selected.", "error");
        return;
      }

      const applications = JSON.parse(localStorage.getItem("candidateApplications")) || [];

      const alreadyApplied = applications.some(app =>
        app.email === currentUser.email &&
        app.electionId === electionId &&
        app.roleId === roleId
      );

      if (alreadyApplied) {
        showMessage("You have already applied for this role.", "error");
        return;
      }

      const application = {
        id: "APP-" + Date.now(),

        candidateName: currentUser.name || "Member",
        email: currentUser.email || "candidate@example.com",

        electionId: electionId,
        electionTitle: selectedElection.title,

        roleId: roleId,
        roleTitle: selectedRole.role_name || selectedRole.roleName || selectedRole.title,

        statement: statement,
        manifesto: manifesto,
        experience: experience,

        status: "Pending",
        appliedAt: new Date().toLocaleString()
      };

      applications.push(application);

      localStorage.setItem("candidateApplications", JSON.stringify(applications));

      showMessage("Application submitted successfully. Waiting for admin approval.");

      form.reset();
      roleSelect.innerHTML = `<option value="">Select election first</option>`;
    });

    function logout() {
      localStorage.removeItem("currentUser");
      window.location.href = "login.html";
    }

    loadElections();
  </script>

</body>
</html>
