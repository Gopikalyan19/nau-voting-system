<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate Dashboard - NAU Voting</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-[11px] font-bold tracking-tight flex-shrink-0">
        NAU
      </div>
      <span class="text-sm font-medium text-gray-900">NAU Voting</span>
    </div>
    <div class="flex gap-2 flex-wrap">
      <a href="candidate-dashboard.html" class="h-[34px] px-4 border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors inline-flex items-center">Candidate</a>
      <button onclick="logout()" class="h-[34px] px-4 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-sm font-medium text-white transition-colors inline-flex items-center">Logout</button>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 px-6 py-10 max-w-4xl mx-auto w-full">

    <!-- Page Header -->
    <div class="flex items-start justify-between gap-4 mb-8 flex-wrap">
      <div>
        <span class="inline-flex items-center gap-1.5 text-xs font-medium text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full mb-3">
          <span class="w-1.5 h-1.5 bg-indigo-600 rounded-full"></span>
          Candidate Apply
        </span>
        <h1 class="text-3xl font-semibold text-gray-900 leading-snug mb-1">Hello, <span id="voterName">Member</span></h1>
        <p class="text-[15px] text-gray-500 leading-relaxed">View elections, apply as candidate, and vote securely.</p>
      </div>
      <a href="vote.html" class="h-10 px-5 bg-indigo-600 hover:bg-indigo-700 active:scale-[0.99] rounded-lg text-sm font-medium text-white transition-all inline-flex items-center flex-shrink-0">
        Start Voting
      </a>
    </div>

    <!-- Alert -->
    <div id="voterMessage" class="hidden mb-6 px-4 py-3 rounded-lg border border-indigo-100 bg-indigo-50 text-sm text-indigo-700"></div>

    <!-- Available Elections -->
    <section class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm mb-6">
      <h3 class="text-base font-semibold text-gray-900 mb-4">Available Elections</h3>
      <div id="electionCards" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
    </section>

    <!-- Candidate Application Form -->
    <section class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
      <h3 class="text-base font-semibold text-gray-900 mb-1">Candidate Application Form</h3>
      <p class="text-[13px] text-gray-500 mb-6">Use this form if you want to stand for a role. Admin approval is required before voters can see you.</p>

      <form id="candidateApplyForm" class="space-y-5">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Election</label>
            <select id="candidateElectionSelect" name="election_id" required
              class="w-full h-10 px-3 border border-gray-200 rounded-lg text-sm text-gray-900 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Role</label>
            <select id="candidateRoleSelect" name="role_id" required
              class="w-full h-10 px-3 border border-gray-200 rounded-lg text-sm text-gray-900 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
              <option>Select election first</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Candidate Statement</label>
          <textarea name="statement" placeholder="Why should members vote for you?" required rows="3"
            class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 bg-gray-50 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-none"></textarea>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Manifesto / Plan</label>
          <textarea name="manifesto" placeholder="Mention your 3 to 5 main plans" rows="3"
            class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 bg-gray-50 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-none"></textarea>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Previous Experience</label>
          <textarea name="experience" placeholder="Leadership, events, volunteering, coordination experience" rows="3"
            class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 bg-gray-50 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-none"></textarea>
        </div>

        <div>
          <button type="submit" class="h-10 px-5 bg-indigo-600 hover:bg-indigo-700 active:scale-[0.99] rounded-lg text-sm font-medium text-white transition-all inline-flex items-center">
            Submit Application
          </button>
        </div>

      </form>
    </section>

  </main>

  <script src="js/api.js"></script>
  <script src="js/voter.js"></script>
   <script src="js/admin.js"></script>
</body>
</html>
