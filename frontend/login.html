<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NAU Voting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input:focus { outline: none; --tw-ring-color: rgba(79,70,229,0.15); }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-sm bg-white border border-gray-200 rounded-xl p-8 shadow-sm">

    <!-- Logo -->
    <div class="flex items-center gap-3 mb-8">
      <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-xs font-bold tracking-tight flex-shrink-0">
        NAU
      </div>
      <div>
        <p class="text-sm font-medium text-gray-900 leading-tight">NAU Voting</p>
        <p class="text-xs text-gray-500">Electoral Management System</p>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="text-xl font-semibold text-gray-900 mb-1">Sign in</h1>
    <p class="text-sm text-gray-500 mb-6">Access your admin, voter, or candidate dashboard.</p>

    <!-- Alert -->
    <div id="message" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-4 py-3 mb-5"></div>

    <!-- Form -->
    <form id="loginForm">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1.5" for="email">Email address</label>
        <input id="email" name="email" type="email" placeholder="you@nau.edu" required
          class="w-full h-10 px-3 text-sm bg-gray-50 border border-gray-200 rounded-lg text-gray-900 placeholder-gray-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-colors">
      </div>
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1.5" for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" required
          class="w-full h-10 px-3 text-sm bg-gray-50 border border-gray-200 rounded-lg text-gray-900 placeholder-gray-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-colors">
      </div>
      <button type="submit"
        class="w-full h-10 bg-indigo-600 hover:bg-indigo-700 active:scale-[0.99] text-white text-sm font-medium rounded-lg transition-all">
        Continue
      </button>
    </form>

    <!-- Divider -->
    <hr class="my-6 border-gray-100">

    <p class="text-center text-sm text-gray-500">
      Don't have an account?
      <a href="register.html" class="text-indigo-600 font-medium hover:underline">Create one</a>
    </p>

  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
